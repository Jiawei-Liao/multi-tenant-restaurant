[tools]
bun = "1"
node = "24"
java = "25"
maven = "3.9"

[tasks.dev-customer]
description = "Customer storefront"
run = "bun run dev"
dir = "apps/customer-web"

[tasks.dev-admin]
description = "Admin dashboard"
run = "bun run dev"
dir = "apps/admin-web"

[tasks.dev-api]
description = "Spring Boot API"
run = "mvn spring-boot:run"
dir = "apps/api"

[tasks.dev]
description = "Run everything"
depends = ["dev-customer", "dev-admin", "dev-api"]

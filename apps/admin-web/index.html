    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      #root {
        min-height: 100vh;
        display: block;
      }
      .loader-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #loader {
        position: relative;
        width: clamp(200px, 45vmin, 360px);
        height: clamp(200px, 45vmin, 360px);
        overflow: hidden;
        color: #f2b134;
        -webkit-mask-image: linear-gradient(
          to top,
          transparent 0%,
          black 14%,
          black 100%
        );
        mask-image: linear-gradient(
          to top,
          transparent 0%,
          black 14%,
          black 100%
        );
      }
      #loader .piece {
        position: absolute;
        bottom: -40px;
        will-change: transform;
      }
    </style>

        // Keep the icon set available to the React loading state so the
        window.__restaurantLoaderIcons = icons;

        const SLOT_COUNT = 5;
        const ICON_SIZE = 32;
        const ICON_BUFFER = 6;
        const slotTimers = [];
        let stopped = false;

        function rand(min, max) {
          return min + Math.random() * (max - min);
        }

        function buildTrajectory(dx, peakPx, rotDeg, samples) {
          const frames = [];
          for (let i = 0; i <= samples; i++) {
            const s = i / samples;
            const x = dx * s;
            const y = -4 * peakPx * s * (1 - s);
            const rot = rotDeg * s;
            frames.push({
              transform: `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) rotate(${rot.toFixed(1)}deg)`,
              offset: s,
            });
          }
          return frames;
        }

        function tossFromSlot(slotIndex) {
          if (stopped || !document.body.contains(container)) return;

          const w = container.clientWidth;
          const h = container.clientHeight;
          const marginFrac = (ICON_SIZE / 2 + ICON_BUFFER) / w;

          const x0 = rand(marginFrac, 1 - marginFrac);
          const t = (x0 - marginFrac) / (1 - 2 * marginFrac);

          let dir;
          if (t < 0.3) dir = 1;
          else if (t > 0.7) dir = -1;
          else dir = Math.random() < 0.5 ? -1 : 1;

          const height = 0.3 + 0.65 * Math.pow(Math.random(), 0.35);
          const boundary = dir === 1 ? 1 - marginFrac : marginFrac;
          const available = Math.abs(boundary - x0);
          const heightSkew = 1 + height * 0.25;
          const spread = Math.min(1, rand(0.2, 1) * heightSkew);
          const dxFrac = available * spread;
          const dx = dxFrac * dir * w;

          const peakPx = height * h * 0.92;
          const rot = rand(180, 420) * dir;
          const duration = rand(2.2, 3.4);

          const el = document.createElement("div");
          el.className = "piece";
          el.innerHTML = icons[Math.floor(Math.random() * icons.length)];
          el.style.left = x0 * 100 + "%";
          container.appendChild(el);

          const frames = buildTrajectory(dx, peakPx, rot, 24);
          const anim = el.animate(frames, {
            duration: duration * 1000,
            easing: "linear",
            fill: "forwards",
          });
          anim.onfinish = () => el.remove();

          const multiplier = 0.5 + 0.8 * Math.pow(Math.random(), 0.6);
          const nextDelay = duration * multiplier;
          slotTimers[slotIndex] = setTimeout(
            () => tossFromSlot(slotIndex),
            nextDelay * 1000,
          );
        }

        for (let i = 0; i < SLOT_COUNT; i++) {
          const initialDelay = rand(0, 4) + i * 0.15;
          slotTimers[i] = setTimeout(
            () => tossFromSlot(i),
            initialDelay * 1000,
          );
        }
      })();
